name: Publish Packages

on:
  push:
    branches:
      - main

jobs:
  create-tag:
    name: Create tag from root package version if needed
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      created_tag: ${{ steps.create_tag.outputs.created_tag }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Read version from root package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create tag if not exists
        id: create_tag
        run: |
          VERSION=${{ steps.get_version.outputs.version }}
          TAG="v$VERSION"
          git fetch --tags
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "created_tag=false" >> $GITHUB_OUTPUT
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
            echo "created_tag=true" >> $GITHUB_OUTPUT
          fi

  validate:
    name: Build and test workspaces
    needs: create-tag
    if: needs.create-tag.outputs.created_tag == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

  publish-vscode:
    name: Publish to Visual Studio Marketplace
    needs:
      - create-tag
      - validate
    if: needs.create-tag.outputs.created_tag == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: npm run package:extension

      - name: Locate VSIX package
        id: locate_vsix
        run: |
          VSIX_FILE=$(ls -1 packages/vscode-extension/project-translator-*.vsix | head -n 1)
          if [ -z "$VSIX_FILE" ]; then
            echo "::error::No VSIX package found."
            exit 1
          fi
          echo "vsix_file=$VSIX_FILE" >> $GITHUB_OUTPUT

      - name: Publish to Visual Studio Marketplace
        run: |
          set +e
          npx vsce publish --packagePath "${{ steps.locate_vsix.outputs.vsix_file }}" --pat "${{ secrets.VSCE_PAT }}" 2>&1 | tee publish.log
          EXIT_CODE=${PIPESTATUS[0]}
          set -e
          if [ "$EXIT_CODE" -ne 0 ]; then
            if grep -qi "already exists" publish.log; then
              echo "VS Marketplace already has this version; treating as success."
              exit 0
            fi
            exit "$EXIT_CODE"
          fi

  publish-ovsx:
    name: Publish to Open VSX
    needs:
      - create-tag
      - validate
    if: needs.create-tag.outputs.created_tag == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      - name: Install dependencies
        run: npm ci

      - name: Package extension
        run: npm run package:extension

      - name: Publish to Open VSX Registry
        env:
          OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
        run: npm run publish:ovsx

  publish-cli:
    name: Publish CLI to npm
    needs:
      - create-tag
      - validate
    if: needs.create-tag.outputs.created_tag == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: Publish CLI
        run: npm run publish:npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
